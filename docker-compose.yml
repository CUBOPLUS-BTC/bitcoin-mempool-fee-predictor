version: '3.8'

services:
  collector:
    build: 
      context: .
    container_name: btc-mempool-collector
    command: python scripts/collector_daemon.py
    restart: always
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - btc-network
    deploy:
      resources:
        limits:
          cpus: '0.40'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  api:
    build: 
      context: .
    container_name: btc-mempool-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 1234
    restart: always
    ports:
      - "1234:1234"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./predictions:/app/predictions
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - btc-network
    depends_on:
      collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1234/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.20'
          memory: 256M

networks:
  btc-network:
    driver: bridge

volumes:
  data:
  models:
