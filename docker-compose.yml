version: '3.8'

services:
  collector:
    build: .
    container_name: btc-mempool-collector
    command: python scripts/collector_daemon.py
    restart: always
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env

  api:
    build: .
    container_name: btc-mempool-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 1234
    restart: always
    ports:
      - "1234:1234"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env
    depends_on:
      - collector
