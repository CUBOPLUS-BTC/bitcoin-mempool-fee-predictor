name: Live Fee Prediction — Every 10min

on:
  # Run every 10 minutes for fee predictions
  schedule:
    - cron: '*/10 * * * *'

  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: predictions-db-lock
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  predict:
    runs-on: ubuntu-24.04  # Pinned version
    timeout-minutes: 10

    steps:
      - name:  Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name:  Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: '3.11.11'  # Pinned version
          cache: 'pip'

      - name:  Install dependencies
        run: |
          pip install -r requirements.txt

      - name:  Verify models exist in repo
        run: |
          echo "Checking for committed models..."
          if ls models/production/best_fee_*.json 1>/dev/null 2>&1; then
            echo " XGBoost models found"
            ls -la models/production/best_fee_*.json
          else
            echo " No XGBoost models in repo yet — run auto_retrain first"
          fi
          if ls models/production/best_fee_*.txt 1>/dev/null 2>&1; then
            echo " LightGBM models found"
            ls -la models/production/best_fee_*.txt
          else
            echo " No LightGBM models in repo yet"
          fi

      - name:  Collect current mempool snapshot
        run: |
          python -c "
          from src.ingestion import MempoolDataIngestion
          ingestion = MempoolDataIngestion()
          path = ingestion.fetch_and_save()
          if path:
              print(f' Snapshot saved: {path}')
          else:
              print(' Snapshot collection failed')
          "

      - name:  Run live fee prediction
        run: |
          python scripts/live_predict.py --once

      - name:  Inspect logs on failure
        if: failure()
        run: |
          echo "--- MODELS ---"
          ls -R models/production/
          echo "--- PREDICTIONS ---"
          ls -la predictions/
          tail -n 20 predictions/ensemble_predictions.csv || echo "No predictions yet"

      - name:  Commit and push predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add prediction files (use || true in case file doesn't exist yet)
          git add predictions/ensemble_predictions.csv || true
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit locally
          git commit -m " Auto-update: Fee predictions" || true
          
          # Stash any uncommitted changes
          git stash push -m "uncommitted changes" || true
          
          # Pull latest from remote with rebase
          git pull origin main --rebase || true
          
          # Apply stash if it exists
          git stash pop || true
          
          # If there are conflicts in CSV files, resolve by taking our changes
          if git diff --name-only --diff-filter=U | grep -q "\.csv$"; then
            echo "Resolving conflicts in CSV files - taking local changes"
            git diff --name-only --diff-filter=U | grep "\.csv$" | while read file; do
              git checkout --ours "$file" || true
              git add "$file" || true
            done
            # Commit the resolved conflicts
            git commit -m " Auto-update: Fee predictions (with merge conflict resolution)" || true
          fi
          
          # Push to remote
          git push origin main --no-verify || {
            echo "Push failed, retrying..."
            git pull origin main --rebase && git push origin main --no-verify || {
              echo "All push attempts failed. Manual intervention required."
              exit 1
            }
          }
          
          echo "Successfully committed and pushed predictions"
