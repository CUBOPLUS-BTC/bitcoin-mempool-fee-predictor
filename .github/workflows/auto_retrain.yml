name: Auto-Retrain Fee Models

on:
  # Run every 1 hour for fee model freshness
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip model validation (use with caution)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📥 Download previous snapshots
        uses: actions/download-artifact@v4
        with:
          name: mempool-snapshots
          path: data/snapshots/
        continue-on-error: true

      - name: 📸 Collect fresh mempool data
        run: |
          echo "🔄 Collecting mempool snapshots for retraining..."
          python scripts/collector_daemon.py --test-run
          echo "✅ Collection complete"

      - name: 📦 Consolidate snapshot data
        run: |
          python -c "
          from src.ingestion import MempoolDataIngestion
          ingestion = MempoolDataIngestion()
          df = ingestion.load_all_snapshots_from_json()
          if df is not None:
              ingestion.save_snapshots_batch(df.to_dict('records'), 'mempool_consolidated.parquet')
              print(f'✅ Consolidated {len(df)} snapshots')
          else:
              print('⚠️ No snapshots to consolidate')
          "

      - name: 🔧 Feature Engineering
        run: |
          python scripts/phase1_feature_engineering.py

      - name: 🔄 Retrain XGBoost + LightGBM Models
        run: |
          VALIDATE_FLAG=""
          if [ "${{ inputs.skip_validation }}" = "true" ]; then
            VALIDATE_FLAG="--no-validate"
          fi
          python scripts/retrain_fee_model.py $VALIDATE_FLAG

      - name: 📤 Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mempool-snapshots
          path: |
            data/snapshots/**/*.json
            data/snapshots/*.parquet
          retention-days: 90
          overwrite: true

      - name: 📤 Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fee-models-${{ github.run_number }}
          path: |
            models/xgb_fee_*
            models/lgbm_fee_*
            models/training_summary_*
            logs/retrain_results_*
          retention-days: 30

      - name: 💾 Commit training results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-retrain: Fee prediction models updated"
          file_pattern: |
            logs/retrain_results_*.json
            models/training_summary_*.json
