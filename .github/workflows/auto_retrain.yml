name: Auto-Retrain Fee Models

on:
  # Run every 1 hour for fee model freshness
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip model validation (use with caution)'
        required: false
        default: false
        type: boolean

concurrency:
  group: predictions-db-lock
  cancel-in-progress: false

permissions:
  contents: write  # Required for committing models
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-24.04  # Pinned version for reproducibility
    timeout-minutes: 30

    steps:
      - name:  Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name:  Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: '3.11.11'  # Pinned version
          cache: 'pip'

      - name:  Install dependencies
        run: |
          pip install -r requirements.txt

      - name:  Collect mempool data (80 snapshots, ~10 min)
        run: |
          echo " Collecting mempool snapshots for retraining..."
          python scripts/collector_daemon.py --interval 8 --test-run --max-snapshots 80
          echo " Collection complete"

      - name:  Consolidate snapshot data
        continue-on-error: true
        run: |
          python -c "
          from src.ingestion import MempoolDataIngestion
          ingestion = MempoolDataIngestion()
          df = ingestion.load_all_snapshots_from_json()
          if df is not None and len(df) > 0:
              ingestion.save_snapshots_batch(df.to_dict('records'), 'mempool_consolidated.parquet')
              print(f' Consolidated {len(df)} snapshots')
          else:
              print(' No snapshots to consolidate — skipping')
          "

      - name:  Retrain models (feature eng + training)
        run: |
          VALIDATE_FLAG=""
          if [ "${{ inputs.skip_validation }}" = "true" ]; then
            VALIDATE_FLAG="--no-validate"
          fi
          python scripts/retrain_fee_model.py $VALIDATE_FLAG

      - name:  Inspect logs on failure
        if: failure()
        run: |
          echo "--- RETRAIN LOGS ---"
          ls -lt logs/ | head -n 5
          cat logs/retrain_*.log | tail -n 50
          echo "--- DATA DIR ---"
          ls -R data/snapshots/

      - name:  Select and Promote Best Models
        run: |
          python scripts/promote_best_models.py

      - name:  Commit and push retrained models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add all model and prediction files (use -f for logs since it's gitignored)
          git add models/xgb_fee_*block_latest.json \
                  models/lgbm_fee_*block_latest.txt \
                  models/production/* \
                  models/*predictions*.csv \
                  models/training_summary_*.json || true
          git add -f logs/retrain_results_*.json || true
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit locally
          git commit -m " Auto-retrain: Fee prediction models updated" || true
          
          # Stash any uncommitted changes
          git stash push -m "uncommitted changes" || true
          
          # Pull latest from remote with rebase
          git pull origin main --rebase || true
          
          # Apply stash if it exists
          git stash pop || true
          
          # If there are conflicts, resolve by taking our changes for model files
          if git diff --name-only --diff-filter=U | grep -q "\.\(json\|txt\|csv\)$"; then
            echo "Resolving conflicts in model/prediction files - taking local changes"
            git diff --name-only --diff-filter=U | grep "\.\(json\|txt\|csv\)$" | while read file; do
              git checkout --ours "$file" || true
              git add "$file" || true
            done
            # Commit the resolved conflicts
            git commit -m " Auto-retrain: Fee prediction models updated (with merge conflict resolution)" || true
          fi
          
          # Push to remote with force-with-lease to prevent overwriting others' work
          git push origin main --no-verify --force-with-lease || {
            echo "Push failed, attempting force push..."
            # If force-with-lease fails, try a regular push
            git push origin main --no-verify || {
              echo "All push attempts failed. Manual intervention required."
              exit 1
            }
          }
          
          echo "Successfully committed and pushed model updates"
