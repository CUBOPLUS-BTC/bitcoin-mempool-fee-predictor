name: Auto-Retrain Fee Models

on:
  # Run every 1 hour for fee model freshness
  schedule:
    - cron: '0 * * * *'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      skip_validation:
        description: 'Skip model validation (use with caution)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4

      - name:  Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name:  Install dependencies
        run: |
          pip install -r requirements.txt

      - name:  Collect mempool data (40 snapshots, ~5 min)
        run: |
          echo " Collecting mempool snapshots for retraining..."
          python scripts/collector_daemon.py --interval 8 --test-run
          echo " Collection complete"

      - name:  Consolidate snapshot data
        continue-on-error: true
        run: |
          python -c "
          from src.ingestion import MempoolDataIngestion
          ingestion = MempoolDataIngestion()
          df = ingestion.load_all_snapshots_from_json()
          if df is not None and len(df) > 0:
              ingestion.save_snapshots_batch(df.to_dict('records'), 'mempool_consolidated.parquet')
              print(f' Consolidated {len(df)} snapshots')
          else:
              print(' No snapshots to consolidate — skipping')
          "

      - name:  Retrain models (feature eng + training)
        run: |
          VALIDATE_FLAG=""
          if [ "${{ inputs.skip_validation }}" = "true" ]; then
            VALIDATE_FLAG="--no-validate"
          fi
          python scripts/retrain_fee_model.py $VALIDATE_FLAG

      - name:  Select and Promote Best Models
        run: |
          python scripts/promote_best_models.py

      - name:  Sync with remote (prevent push conflicts)
        run: |
          git pull --rebase origin main || true

      - name:  Commit retrained models & predictions
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: " Auto-retrain: Fee prediction models updated"
          push_options: "--no-verify"
          file_pattern: |
            models/xgb_fee_*block_latest.json
            models/lgbm_fee_*block_latest.txt
            models/production/*
            models/*predictions*.csv
            models/training_summary_*.json
            logs/retrain_results_*.json
