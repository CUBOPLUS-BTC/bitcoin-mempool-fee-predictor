name: Ensemble Predictions Validation

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:      # Allow manual trigger

concurrency:
  group: predictions-db-lock
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name:  Checkout repository
        uses: actions/checkout@v4
        
      - name:  Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name:  Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name:  Run validation
        run: |
          python scripts/validate_predictions.py

      - name:  Commit and push validated predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions/ensemble_predictions.csv
          git commit -m " Validate: Updated ensemble prediction status" || exit 0
          git pull --rebase origin main || true
          git push origin main --no-verify
